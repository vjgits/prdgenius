<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ prd.feature_name }} — PRDGenius</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'Inter',sans-serif; background:#0a0a14; }
    .prd-output h1 { font-size:1.6rem;font-weight:800;color:#fff;margin:0 0 0.5rem;border-bottom:2px solid #4338ca;padding-bottom:0.75rem; }
    .prd-output h2 { font-size:1.15rem;font-weight:700;color:#e0e7ff;margin:2rem 0 0.75rem;padding:0.4rem 0.85rem;background:linear-gradient(90deg,rgba(67,56,202,0.18),transparent);border-left:3px solid #6366f1;border-radius:0 6px 6px 0; }
    .prd-output h3 { font-size:1rem;font-weight:600;color:#c7d2fe;margin:1.25rem 0 0.5rem; }
    .prd-output p { color:#9ca3af;line-height:1.75;margin:0.5rem 0;font-size:0.9rem; }
    .prd-output ul,.prd-output ol { padding-left:1.5rem;margin:0.5rem 0; }
    .prd-output li { color:#9ca3af;line-height:1.7;font-size:0.9rem;margin:0.25rem 0; }
    .prd-output strong { color:#e0e7ff; }
    .prd-output em { color:#a5b4fc;font-style:italic; }
    .prd-output table { width:100%;border-collapse:collapse;margin:1rem 0;font-size:0.85rem; }
    .prd-output th { background:linear-gradient(135deg,#4338ca,#6366f1);color:#fff;padding:0.65rem 0.85rem;text-align:left;font-weight:600;border:1px solid #4338ca; }
    .prd-output td { color:#9ca3af;padding:0.6rem 0.85rem;border:1px solid #1f2937; }
    .prd-output tr:nth-child(even) td { background:rgba(99,102,241,0.05); }
    .prd-output tr:hover td { background:rgba(99,102,241,0.08); }
    .prd-output blockquote { border-left:3px solid #6366f1;padding:0.5rem 1rem;background:rgba(99,102,241,0.08);color:#a5b4fc;font-style:italic;margin:0.75rem 0;border-radius:0 6px 6px 0; }
    .prd-output hr { border:none;border-top:1px solid #1f2937;margin:1.75rem 0; }
    .prd-output code { background:#1e1b4b;color:#a5b4fc;padding:0.15rem 0.45rem;border-radius:4px;font-size:0.8rem;border:1px solid #312e81; }
    .prd-output pre { background:#0f0f1a;border:1px solid #1f2937;border-radius:8px;padding:1rem;overflow-x:auto;margin:0.75rem 0; }
    .prd-output input[type=checkbox] { accent-color:#6366f1; }
    .dl-btn { transition:all 0.15s; }
    .dl-btn:hover { transform:translateY(-1px); }

    @media print {
      nav, .no-print { display:none !important; }
      body { background:white !important; }
      .prd-output { background:white !important;border:none !important;padding:0 !important; }
      .prd-output h1,.prd-output h2,.prd-output h3 { color:#000 !important; }
      .prd-output h2 { background:none !important;border-left:3px solid #4338ca !important; }
      .prd-output p,.prd-output li,.prd-output td { color:#333 !important; }
      .prd-output th { background:#4338ca !important;-webkit-print-color-adjust:exact;print-color-adjust:exact; }
    }
  </style>
</head>
<body class="min-h-screen text-white">

  <!-- Nav -->
  <nav class="px-6 py-4 flex items-center justify-between sticky top-0 z-10 no-print" style="background:rgba(10,10,20,0.95);border-bottom:1px solid rgba(255,255,255,0.07);backdrop-filter:blur(12px)">
    <div class="flex items-center gap-4">
      <a href="/app" class="text-gray-400 hover:text-white transition flex items-center gap-1.5 text-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Dashboard
      </a>
      <span class="text-gray-700">|</span>
      <div class="flex items-center gap-2">
        <div class="w-6 h-6 rounded-md flex items-center justify-center text-white font-bold text-xs" style="background:linear-gradient(135deg,#6366f1,#8b5cf6)">P</div>
        <span class="font-bold text-sm">PRDGenius</span>
      </div>
      <span class="text-xs px-2 py-0.5 rounded-full capitalize" style="background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc">
        {{ prd.format_style }} format
      </span>
      <span class="text-xs text-gray-600">{{ prd.created_at[:10] }}</span>
    </div>
    <div class="flex gap-2 items-center">
      <!-- Copy Markdown -->
      <button onclick="copyMarkdown()" id="copyBtn"
        class="dl-btn flex items-center gap-1.5 text-gray-300 px-3 py-1.5 rounded-lg text-xs font-medium transition"
        style="background:rgba(31,41,55,0.8);border:1px solid rgba(55,65,81,0.8)">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        Copy Markdown
      </button>
      <!-- Download Word -->
      <a href="/api/download-prd/{{ prd.id }}/docx"
        class="dl-btn flex items-center gap-1.5 text-blue-300 px-3 py-1.5 rounded-lg text-xs font-semibold transition"
        style="background:rgba(30,58,138,0.4);border:1px solid rgba(59,130,246,0.4)">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Word (.docx)
      </a>
      <!-- Save as PDF -->
      <button onclick="window.print()"
        class="dl-btn flex items-center gap-1.5 text-rose-300 px-3 py-1.5 rounded-lg text-xs font-semibold transition"
        style="background:rgba(136,19,55,0.3);border:1px solid rgba(244,63,94,0.35)">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
        Save as PDF
      </button>
      <!-- New PRD -->
      <a href="/app"
        class="dl-btn flex items-center gap-1.5 text-white px-4 py-1.5 rounded-lg text-xs font-bold transition"
        style="background:linear-gradient(135deg,#6366f1,#4f46e5)">
        + New PRD
      </a>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-6 py-10">
    <div id="prdContent" class="prd-output rounded-2xl p-8" style="background:rgba(15,15,30,0.7);border:1px solid rgba(255,255,255,0.07)"></div>
  </div>

  <script>
    const rawMarkdown = {{ prd.output | tojson }};
    document.getElementById('prdContent').innerHTML = marked.parse(rawMarkdown);

    async function copyMarkdown() {
      try {
        await navigator.clipboard.writeText(rawMarkdown);
        const btn = document.getElementById('copyBtn');
        const orig = btn.innerHTML;
        btn.textContent = 'Copied!';
        btn.style.color = '#4ade80';
        setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 2000);
      } catch(e) { alert('Copy failed. Please select and copy manually.'); }
    }
  </script>
</body>
</html>
