<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign up - PRDGenius</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>body { font-family: 'Inter', sans-serif; background: #0f0f1a; }</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2 mb-6">
        <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center text-white font-bold text-sm">P</div>
        <span class="font-bold text-lg text-white">PRDGenius</span>
      </a>
      <h1 class="text-2xl font-bold text-white">Start for free</h1>
      <p class="text-gray-500 mt-1">A few free PRDs to start. Then $9.99/month for up to 40 FAANG-quality PRDs.</p>
    </div>
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8">
      <div id="error" class="hidden bg-red-950 border border-red-800 text-red-300 text-sm px-4 py-3 rounded-lg mb-6"></div>
      <form id="signupForm" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Full name</label>
          <input type="text" name="name" required placeholder="John Doe"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Email</label>
          <input type="email" name="email" required placeholder="you@gmail.com"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
          <input type="password" name="password" required placeholder="Min. 8 characters"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"/>
        </div>
        <button type="submit" id="submitBtn"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl font-semibold transition">
          Create free account
        </button>
      </form>
      <p class="text-center text-gray-500 text-sm mt-4">
        Already have an account? <a href="/login" class="text-indigo-400 hover:text-indigo-300 font-medium">Log in</a>
      </p>
    </div>
  </div>
  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('error');
      btn.disabled = true; btn.textContent = 'Creating account...'; err.classList.add('hidden');
      const form = new FormData(e.target);
      try {
        const res = await fetch('/api/signup', { method: 'POST', body: form });
        const data = await res.json();
        if (res.ok) {
          window.location.href = data.redirect || '/app';
        } else {
          let msg = 'Signup failed. Please try again.';
          if (data.error) msg = data.error;
          else if (data.detail) {
            msg = Array.isArray(data.detail)
              ? data.detail.map(d => d.msg || JSON.stringify(d)).join(', ')
              : data.detail;
          }
          throw new Error(msg);
        }
      } catch(ex) {
        err.textContent = ex.message; err.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Create free account';
      }
    });
  </script>
</body>
</html>
